<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Error | Student Performance Prediction</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: #F9FAFB;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }
        .error-container {
            max-width: 480px;
            text-align: center;
            background: white;
            border-radius: 16px;
            padding: 48px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }
        .error-icon {
            width: 80px;
            height: 80px;
            background: #FEF2F2;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 24px;
        }
        .error-icon svg {
            width: 40px;
            height: 40px;
            color: #DC2626;
        }
        h1 {
            font-size: 1.5rem;
            font-weight: 700;
            color: #111827;
            margin-bottom: 12px;
        }
        p {
            color: #6B7280;
            line-height: 1.6;
            margin-bottom: 24px;
        }
        .error-details {
            background: #F9FAFB;
            border-radius: 8px;
            padding: 16px;
            font-family: monospace;
            font-size: 0.875rem;
            color: #DC2626;
            text-align: left;
            margin-bottom: 24px;
            word-break: break-all;
        }
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 12px 24px;
            background: #4F46E5;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            text-decoration: none;
            transition: background 0.2s;
        }
        .btn:hover {
            background: #4338CA;
        }
        .instructions {
            margin-top: 32px;
            padding-top: 24px;
            border-top: 1px solid #E5E7EB;
            text-align: left;
        }
        .instructions h3 {
            font-size: 0.875rem;
            font-weight: 600;
            color: #111827;
            margin-bottom: 12px;
        }
        .instructions code {
            display: block;
            background: #111827;
            color: #10B981;
            padding: 16px;
            border-radius: 8px;
            font-size: 0.875rem;
            margin-top: 8px;
        }
    </style>
</head>
<body>
    <div class="error-container">
        <div class="error-icon">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" />
            </svg>
        </div>
        
        <h1>{{ message }}</h1>
        <p>The application couldn't load the required model files. Please run the training pipeline first.</p>
        
        {% if error %}
        <div class="error-details">
            {{ error }}
        </div>
        {% endif %}
        
        <a href="/" class="btn">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" />
            </svg>
            Retry
        </a>
        
        <div class="instructions">
            <h3>To fix this issue:</h3>
            <code>python training_pipeline.py</code>
        </div>
    </div>
</body>
</html>
